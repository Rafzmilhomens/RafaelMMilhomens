baseURL = "https://rafzmilhomens.github.io/RafaelMMilhomens/"
locale = "pt-br"
title = "Rafael M. Milhomens - BLOG"
languageCode = "pt-br"

[permalinks]
ensaios = "/ensaios/:slug/"
fotografia = "/fotografia/:slug/"
poesia = "/poesia/:slug/"
publicacoes = "/publicacoes/:slug/"
leituras = "/leituras/:slug/"
apoie = "/apoie/:slug/"
sobre = "/sobre/:slug/"

[taxonomies]
tag = "tags"

[params]
author = "Rafael M. Milhomens"
description = "Blog sobre os mecanismos invisíveis que organizam a percepção coletiva — religião, arte, algoritmo — a partir do caso brasileiro."

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.footnote]
        enable = true

disableKinds = ["RSS"]

