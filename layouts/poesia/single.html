{{ define "main" }}
<div class="poesia-layout">
  <aside class="poesia-sidebar">
    <nav class="sidebar-nav">
      <h3>Poemas</h3>
      <ul>
        {{ range (where .Site.RegularPages "Section" "poesia") }}
          <li class="{{ if eq $.Permalink .Permalink }}active-poema{{ end }}">
            <a href="{{ .Permalink }}">{{ .Title }}</a>
          </li>
        {{ end }}
      </ul>
    </nav>
  </aside>

  <article class="poesia-content">
    {{ if .IsPage }}
      <h1>{{ .Title }}</h1>
      <div class="poem-body">
        {{ .Content }}
      </div>
    {{ else }}
      <h1>Poesia</h1>
      <p>Selecione um poema ao lado para começar a leitura.</p>
    {{ end }}
  </article>
</div>
{{ end }}
