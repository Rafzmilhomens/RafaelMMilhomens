{{ define "main" }}

{{ if .IsPage }}
  <!-- Página individual de um poema -->
  <article>
    <h1>{{ .Title }}</h1>
    <div class="poem-body">
      {{ .Content }}
    </div>
  </article>
{{ else }}
  <!-- Página de listagem de poemas -->
  <h1>Poesia</h1>
  <p style="color: var(--grey); font-style: italic;">Selecione um título para começar a leitura.</p>
  
  <ul class="post-list">
    {{ range sort (where .Site.RegularPages "Section" "poesia") "Title" }}
      <li>
        <a href="{{ .Permalink }}" class="post-link">{{ .Title }}</a>
      </li>
    {{ end }}
  </ul>
{{ end }}

{{ end }}
