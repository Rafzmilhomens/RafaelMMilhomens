{{ define "main" }}

<h1>{{ .Title }}</h1>

{{ .Content }}

<ul class="post-list">
  {{ range .Pages.ByDate.Reverse }}
  <li>
    <a href="{{ .RelPermalink }}" class="post-link">{{ .Title }}</a>
    <time>{{ .Date.Format "2 de January de 2006" }}</time>
    {{ if .Params.summary }}
    <p class="summary">{{ .Params.summary }}</p>
    {{ else if .Summary }}
    <p class="summary">{{ .Summary }}</p>
    {{ end }}
  </li>
  {{ end }}
</ul>

{{ end }}
